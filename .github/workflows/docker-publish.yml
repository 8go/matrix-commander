name: Publish Docker image

# Adding "git push origin <tag>" made it trigger the workflow twice.
# So, only pushing schema tags with 'v' prefix triggers workflow.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

  workflow_dispatch:

jobs:
  buildx:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Required if building multi-arch images
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          buildkitd-flags: --debug

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
          # Removed 'type=ref,event=branch' because this workflow only triggers on tags
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

            # Fallback tag for manual runs (workflow_dispatch)
            # It will tag the image as 'latest' when one clicks "Run workflow"
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' }}
            
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .  # Added for explicit clarity
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
